services:
  postgres:
    image: postgres:16
    container_name: infiniportal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: infiniportal
      POSTGRES_USER: infiniportal
      POSTGRES_PASSWORD: infiniportal_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: infiniportal-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: python main.py

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: infiniportal-web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "5050:5000"
    command: hypercorn webserver:app --bind 0.0.0.0:5050

  worker:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: infiniportal-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: python worker.py

volumes:
  postgres-data:
  infiniportal-data: